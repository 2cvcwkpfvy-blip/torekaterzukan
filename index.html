<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>トレカ図鑑</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.section{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

button{
width:100%;
padding:15px;
margin:5px 0;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-size:16px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<h1>トレカ図鑑</h1>

<div id="home" class="section">
<h2>シリーズ選択</h2>

<button onclick="showSV()">
スカーレット＆バイオレット
</button>

<button disabled>
ソード＆シールド（準備中）
</button>

<button disabled>
サン＆ムーン（準備中）
</button>
</div>

<div id="sv" class="section hidden">

<button onclick="backHome()">
← 戻る
</button>

<h2>SVシリーズ</h2>

<button>SV1S スカーレットex</button>
<button>SV1V バイオレットex</button>
<button>SV1a トリプレットビート</button>
<button>SV2P スノーハザード</button>
<button>SV2D クレイバースト</button>
<button>SV2a ポケモンカード151</button>

</div>

<script>

function showSV(){
document.getElementById("home").classList.add("hidden");
document.getElementById("sv").classList.remove("hidden");
}

function backHome(){
document.getElementById("sv").classList.add("hidden");
document.getElementById("home").classList.remove("hidden");
}

</script>

</body>
</html>
