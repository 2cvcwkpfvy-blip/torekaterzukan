<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカター図鑑</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#F5F4F0;color:#111;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;padding:22px}
.header{min-height:70vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-bottom:1px solid #C9A227;position:relative}
h1{margin:0;font-size:38px;letter-spacing:.12em}
.sub{margin-top:12px;font-size:12px;letter-spacing:.24em;color:#8a7330}
.copy{margin-top:34px;line-height:2;font-size:15px}
.menuBtn{position:absolute;top:18px;left:-10px;width:46px;height:46px;border:1px solid #C9A227;background:#111;color:#C9A227;border-radius:50%;font-size:24px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;padding:88px 24px}
.overlay.open{display:block}
.menuItem{display:block;width:100%;background:#F5F4F0;color:#111;border:1px solid #C9A227;padding:18px;margin:14px 0;border-radius:14px;font-size:18px;opacity:0;transform:translateY(-20px);animation:drop .35s forwards}
.menuItem:nth-child(2){animation-delay:.06s}.menuItem:nth-child(3){animation-delay:.12s}.menuItem:nth-child(4){animation-delay:.18s}
@keyframes drop{to{opacity:1;transform:translateY(0)}}
.panel{background:#fffdf8;border:1px solid #d8c88a;border-radius:20px;padding:22px;margin:18px auto;max-width:820px;box-shadow:0 12px 28px rgba(0,0,0,.08)}
button{font-family:inherit}
.btn{width:100%;background:#fff;color:#111;border:1px solid #C9A227;border-radius:14px;padding:16px;margin:8px 0;font-size:16px}
.dark{background:#111;color:#C9A227}
.hidden{display:none}
.setCode{display:block;font-size:13px;color:#8a7330;letter-spacing:.12em}
.setName{display:block;margin-top:5px;font-size:18px}
.rarityBtn{text-align:left}
.cardGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.cardBox{background:#faf9f4;border:1px solid #d8c88a;border-radius:12px;padding:8px;text-align:center;font-family:sans-serif;font-size:13px}
.imgBox{aspect-ratio:63/88;background:linear-gradient(135deg,#ddd,#fff);border-radius:8px;margin-bottom:8px}
.small{font-family:sans-serif;font-size:12px;color:#666}
.spread{display:grid;grid-template-columns:1fr 26px 1fr;gap:10px;overflow-x:auto}
.page{min-width:310px;background:#ede9dd;border-radius:18px;padding:12px}
.grid9{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid12{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ring{background:#111;border-radius:18px;min-height:430px;position:relative}
.ring:before,.ring:after{content:"";position:absolute;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:#C9A227}
.ring:before{top:120px}.ring:after{bottom:120px}
</style>
</head>
<body>

<div class="header">
<button class="menuBtn" onclick="toggleMenu()">☰</button>
<h1>トレカター図鑑</h1>
<div class="sub">TRADING CARD ARCHIVE</div>
<div class="copy">
コレクションを、もっと美しく。<br>
ファイリングシミュレーターができる<br>
唯一のコレクションサイト
</div>
</div>

<div id="menu" class="overlay">
<button class="menuItem dark" onclick="toggleMenu()">閉じる</button>
<button class="menuItem" onclick="go('home')">ポケモンカード</button>
<button class="menuItem" onclick="go('filing')">ファイリングシミュレーター</button>
</div>

<div id="home" class="panel hidden">
<h2>ポケモンカード</h2>
<button class="btn" onclick="go('sv')">スカーレット＆バイオレット</button>
<button class="btn" onclick="go('promo')">プロモカード</button>
</div>

<div id="sv" class="panel hidden">
<button class="btn dark" onclick="go('home')">← 戻る</button>
<h2>スカーレット＆バイオレット</h2>
<div id="setList"></div>
</div>

<div id="promo" class="panel hidden">
<button class="btn dark" onclick="go('home')">← 戻る</button>
<h2>プロモカード</h2>
<button class="btn" onclick="openPromo()">SV-P</button>
</div>

<div id="box" class="panel hidden">
<button class="btn dark" onclick="go('sv')">← BOX一覧へ戻る</button>
<h2 id="boxTitle"></h2>
<div id="rarityList"></div>
</div>

<div id="cards" class="panel hidden">
<button class="btn dark" onclick="go('box')">← レアリティへ戻る</button>
<h2 id="cardsTitle"></h2>
<p class="small">画像は後で追加。画像を貼るだけで完成する枠です。</p>
<div id="cardGrid" class="cardGrid"></div>
</div>

<div id="filing" class="panel hidden">
<h2>ファイリングシミュレーター</h2>
<button class="btn" onclick="showFiling(9)">9ポケット 両面見開き</button>
<button class="btn" onclick="showFiling(12)">12ポケット 両面見開き</button>
<div id="filingArea"></div>
</div>

<script src="data.js"></script>
<script>
let currentBox="";

function toggleMenu(){document.getElementById("menu").classList.toggle("open")}

function go(id){
document.getElementById("menu").classList.remove("open");
["home","sv","promo","box","cards","filing"].forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
window.scrollTo(0,0);
}

function renderSets(){
let html="";
SETS.forEach(s=>{
let full=s[0]+" "+s[1];
html+=`<button class="btn" onclick="openBox('${full}')"><span class="setCode">${s[0]}</span><span class="setName">${s[1]}</span></button>`;
});
document.getElementById("setList").innerHTML=html;
}

function openBox(name){
currentBox=name;
document.getElementById("boxTitle").textContent=name;
let box=CARD_DATA[name]||{};
let rarities=["AR","SR","SAR","UR"];
let html="";
rarities.forEach(r=>{
let count=box[r]?box[r].length:0;
html+=`<button class="btn rarityBtn" onclick="openRarity('${r}')">${r}　|　全${count}種</button>`;
});
document.getElementById("rarityList").innerHTML=html;
go("box");
}

function openPromo(){
currentBox="SV-P プロモカード";
document.getElementById("boxTitle").textContent=currentBox;
document.getElementById("rarityList").innerHTML=`<button class="btn rarityBtn" onclick="openRarity('PROMO')">PROMO　|　全0種</button>`;
go("box");
}

function openRarity(r){
let list=(CARD_DATA[currentBox]&&CARD_DATA[currentBox][r])?CARD_DATA[currentBox][r]:[];
document.getElementById("cardsTitle").textContent=currentBox+" / "+r;
let html="";
if(list.length===0){
html=`<p class="small">カードデータ登録準備中</p>`;
}else{
list.forEach(name=>{
html+=`<div class="cardBox"><div class="imgBox"></div>${name}</div>`;
});
}
document.getElementById("cardGrid").innerHTML=html;
go("cards");
}

function showFiling(num){
let cls=num===9?"grid9":"grid12";
let html=`<h3>${num}ポケット見開き</h3><div class="spread"><div class="page"><h4>左ページ</h4><div class="${cls}">`;
for(let i=0;i<num;i++)html+=`<div class="cardBox"><div class="imgBox"></div></div>`;
html+=`</div></div><div class="ring"></div><div class="page"><h4>右ページ</h4><div class="${cls}">`;
for(let i=0;i<num;i++)html+=`<div class="cardBox"><div class="imgBox"></div></div>`;
html+=`</div></div></div>`;
document.getElementById("filingArea").innerHTML=html;
}

renderSets();
</script>
</body>
</html>
